<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>割り振りツール v15 Cloud (liberta.site)</title>
<style>
/* スタイルは元のデザインを維持 */
*,*::before,*::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Yu Gothic UI","Meiryo",system-ui,sans-serif;
  background: #eef1f5; color: #222; font-size: 14px; line-height: 1.4;
  display: none; /* 認証まで隠す */
}
header { background: #2c3e50; color: white; padding: 8px 12px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 50; }
header h1 { margin: 0; font-size: 16px; }
.date-tabs { display: flex; gap: 3px; flex: 1; overflow-x: auto; }
.date-tab { padding: 5px 9px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.date-tab.active { background: #3498db; font-weight: bold; }
header button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; background: #27ae60; color: white; }
header button:disabled { background: #ccc; }
.diag { background: #fffbcc; padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #e6d97a; }
main { padding: 10px; }
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.site { background: white; border-radius: 6px; padding: 8px 10px; border: 1px solid #dde1e7; min-height: 120px; }
.site.night { background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%); color: #ecf0f1; }
.site-name { font-weight: bold; margin-bottom: 5px; }
.site-body { display: flex; flex-wrap: wrap; gap: 4px; }
.chip { background: #3498db; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; display: flex; align-items: center; }
.chip.sub { background: #8e44ad; }
.chip .rm { margin-left: 5px; cursor: pointer; font-weight: bold; }
.add-btn { padding: 2px 10px; border: 1px dashed #95a5a6; background: white; border-radius: 12px; font-size: 12px; cursor: pointer; color: #7f8c8d; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: 8px; padding: 15px; width: 90%; max-width: 500px; max-height: 80vh; display: flex; flex-direction: column; }
.modal .people { overflow-y: auto; display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.pchip { background: #16a085; color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 10px 20px; border-radius: 5px; z-index: 1000; }
</style>
</head>
<body>
<header>
  <h1>割り振り v15 Cloud</h1>
  <div class="date-tabs" id="tabs"></div>
  <button id="btnSave" onclick="saveToServer()">💾 保存</button>
</header>
<div class="diag" id="diag">クラウドと通信中...</div>
<main><div class="sites-grid" id="grid"></div></main>

<div class="modal-bg" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <h3 id="modalTitle">追加</h3>
    <input type="text" id="modalSearch" placeholder="検索..." style="width:100%; padding:8px;">
    <div class="people" id="modalPeople"></div>
  </div>
</div>

<script>
'use strict';

const GAS_URL = "https://script.google.com/macros/s/AKfycbxxAqLMYHCAyFGxX6S8gcXmmZ0hHTkfUB2ydFs8PpfG0i2Ko51CDlrYE4TzdFqk63WWGw/exec";
const PASS = "liberta2024";

var DATA = {"dates": [{"date": "2026-04-12", "day": "日"}, {"date": "2026-04-13", "day": "月"}, {"date": "2026-04-14", "day": "火"}, {"date": "2026-04-15", "day": "水"}, {"date": "2026-04-16", "day": "木"}, {"date": "2026-04-17", "day": "金"}, {"date": "2026-04-18", "day": "土"}], "sites": [{"name": "湯島", "shift": "day"}, {"name": "東雲", "shift": "day"}, {"name": "赤坂", "shift": "day"}, {"name": "鉄鋼ビル", "shift": "night"}, {"name": "休み", "shift": "day"}], "people": ["BS", "E解", "ITG", "SK", "小林", "田中", "花井", "鈴木", "長友", "鵜野"]};
var SUB = ['BS', 'ITG', 'SK'];

var state = { date: "2026-04-12", assign: {}, customSites: [], customDates: [] };

window.onload = function() {
  if (prompt("パスワード") === PASS) {
    document.body.style.display = "block";
    loadFromServer();
  } else {
    alert("拒否されました");
    window.location.reload();
  }
};

async function loadFromServer() {
  document.getElementById('diag').textContent = "同期中...";
  try {
    const res = await fetch(GAS_URL);
    const cloud = await res.json();
    if (cloud && cloud.assign) {
      state.assign = cloud.assign;
      state.customSites = cloud.customSites || [];
      state.customDates = cloud.customDates || [];
    }
  } catch (e) { toast("読込失敗: スプレッドシートが空か設定ミスです"); }
  renderTabs(); render();
}

async function saveToServer() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = "保存中...";
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(state)
    });
    const result = await res.json();
    if (result.status === "success") toast("✅ クラウドに保存しました");
    else toast("❌ 保存失敗: GAS側のエラー");
  } catch (e) {
    toast("❌ 保存失敗: 通信エラー (デプロイ設定を確認)");
  } finally {
    btn.disabled = false; btn.textContent = "💾 保存";
  }
}

function renderTabs() {
  const c = document.getElementById('tabs'); c.innerHTML = '';
  DATA.dates.forEach(d => {
    const b = document.createElement('button');
    b.className = 'date-tab' + (d.date === state.date ? ' active' : '');
    b.textContent = d.date.slice(5);
    b.onclick = () => { state.date = d.date; renderTabs(); render(); };
    c.appendChild(b);
  });
}

function render() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  const dayMap = state.assign[state.date] || {};
  DATA.sites.forEach(site => {
    const s = document.createElement('div');
    s.className = 'site' + (site.shift === 'night' ? ' night' : '');
    const mems = dayMap[site.name] || [];
    s.innerHTML = `<div class="site-head"><div class="site-name">${site.name}</div><div>${mems.length}名</div></div>`;
    const body = document.createElement('div');
    body.className = 'site-body';
    mems.forEach((p, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (SUB.includes(p) ? ' sub' : '');
      chip.innerHTML = `${p} <span class="rm" onclick="removeP('${site.name}', ${i})">×</span>`;
      body.appendChild(chip);
    });
    const add = document.createElement('button');
    add.className = 'add-btn'; add.textContent = '＋ 追加';
    add.onclick = () => openModal(site.name);
    body.appendChild(add); s.appendChild(body); g.appendChild(s);
  });
  document.getElementById('diag').textContent = `${state.date} の配置を編集中`;
}

function openModal(site) { state.currentSite = site; renderModal(); document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function renderModal() {
  const c = document.getElementById('modalPeople'); c.innerHTML = '';
  DATA.people.forEach(p => {
    const b = document.createElement('button'); b.className = 'pchip'; b.textContent = p;
    b.onclick = () => {
      const day = state.assign[state.date] = state.assign[state.date] || {};
      const list = day[state.currentSite] = day[state.currentSite] || [];
      if (!SUB.includes(p)) Object.keys(day).forEach(s => day[s] = day[s].filter(x => x !== p));
      list.push(p); render(); renderModal();
    };
    c.appendChild(b);
  });
}
function removeP(site, i) { state.assign[state.date][site].splice(i,1); render(); }
function toast(m) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
